<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G10 L7 е–®еӯ—еҲҶзө„з·ҙзҝ’</title>
<style>
:root {
  --teal:      #1a6b5f;
  --teal-mid:  #2a9d8f;
  --teal-light:#52c9bb;
  --teal-pale: #e0f5f3;
  --teal-bg:   #f0faf9;
  --green:     #57cc99;
  --amber:     #c9a227;
  --coral:     #e76f51;
  --gray:      #6b8f8c;
  --dark:      #1a2e2c;
  --mid:       #3a5552;
  --light:     #7a9896;
  --white:     #ffffff;
  --shadow:    0 2px 10px rgba(26,107,95,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--teal-bg);color:var(--dark);min-height:100vh;}

header{background:var(--teal);padding:20px 18px 16px;text-align:center;}
header h1{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px;}
header p{color:rgba(255,255,255,0.75);font-size:13px;}

.progress-wrap{background:var(--white);padding:12px 18px;border-bottom:1px solid var(--teal-pale);}
.prog-label{font-size:12px;color:var(--light);margin-bottom:6px;display:flex;justify-content:space-between;}
.prog-bar{height:6px;background:#d0ecea;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--teal-mid);border-radius:99px;transition:width 0.4s;}

.group-tabs{display:flex;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--teal-pale);}
.group-tab{flex:0 0 auto;padding:10px 18px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;}
.group-tab.active{color:var(--teal);border-bottom-color:var(--teal-mid);background:var(--teal-pale);}
.group-tab.locked{color:#ccc;cursor:not-allowed;}

main{padding:16px 14px 56px;max-width:700px;margin:0 auto;}

.phase-bar{display:flex;gap:6px;margin-bottom:16px;}
.phase-step{flex:1;padding:8px 4px;border-radius:8px;text-align:center;font-size:12px;font-weight:700;}
.phase-step.done{background:var(--green);color:#fff;}
.phase-step.current{background:var(--teal);color:#fff;}
.phase-step.pending{background:#e8f5f4;color:var(--gray);}

/* Learn cards */
.learn-card{background:var(--white);border-radius:14px;padding:16px 16px 12px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--teal-light);}
.card-top{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.card-en{font-size:20px;font-weight:700;color:var(--teal);font-family:'Courier New',monospace;}
.card-ph{font-size:12px;color:var(--light);}
.pos-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.pos-n{background:#ddf0ed;color:var(--teal);}
.pos-v{background:#fdefd0;color:#7a5000;}
.pos-adj{background:#e0f0d0;color:#3a6a00;}
.pos-adv{background:#fce0d8;color:#7a2000;}
.card-zh{font-size:18px;font-weight:700;margin-bottom:6px;}
.card-colloc{font-size:13px;color:var(--teal-mid);background:var(--teal-pale);display:inline-block;padding:2px 10px;border-radius:20px;margin-bottom:6px;}
.card-ex{font-size:13px;color:var(--light);font-style:italic;}
.card-ex b{color:var(--teal);font-style:normal;}

/* MCQ */
.mcq-block{margin-bottom:14px;}
.mcq-q{background:var(--white);border-radius:12px;padding:14px 16px 10px;box-shadow:var(--shadow);}
.mcq-qtext{font-size:15px;font-weight:600;margin-bottom:10px;}
.mcq-options{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.mcq-opt{padding:10px 12px;border:2px solid var(--teal-pale);border-radius:10px;background:var(--white);font-family:inherit;font-size:14px;color:var(--dark);cursor:pointer;transition:all 0.15s;text-align:left;}
.mcq-opt:hover:not(:disabled){background:var(--teal-pale);border-color:var(--teal-light);}
.mcq-opt.correct{background:#d4f5e5;border-color:#57cc99;color:#1a5c35;}
.mcq-opt.wrong{background:#fde4de;border-color:var(--coral);color:#7a2000;}
.mcq-opt:disabled{cursor:default;}
.feedback{font-size:13px;margin-top:6px;padding:5px 10px;border-radius:7px;display:none;}
.feedback.ok{background:#d4f5e5;color:#1a5c35;display:block;}
.feedback.ng{background:#fde4de;color:#7a2000;display:block;}

/* Matching */
.match-wrap{background:var(--white);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
.match-instruct{font-size:13px;color:var(--light);margin-bottom:14px;text-align:center;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;}
.match-col-label{font-size:12px;font-weight:700;color:var(--teal);text-align:center;padding:4px 0 8px;letter-spacing:1px;}
.match-col{display:flex;flex-direction:column;gap:7px;}
.match-item{padding:10px 12px;border:2px solid var(--teal-pale);border-radius:10px;background:var(--white);font-family:inherit;font-size:14px;color:var(--dark);cursor:pointer;transition:all 0.15s;text-align:center;user-select:none;}
.match-item:hover:not(.matched):not(.locked){background:var(--teal-pale);border-color:var(--teal-light);}
.match-item.selected{background:var(--teal);color:#fff;border-color:var(--teal);}
.match-item.matched{background:#d4f5e5;border-color:#57cc99;color:#1a5c35;cursor:default;}
.match-item.wrong-flash{background:#fde4de;border-color:var(--coral);color:#7a2000;}
.match-item.locked{cursor:default;}
.match-score{text-align:center;font-size:14px;font-weight:700;color:var(--teal);margin-top:12px;min-height:22px;}

/* Buttons */
.next-btn,.unlock-btn{display:block;width:100%;padding:14px;margin-top:16px;border:none;border-radius:12px;background:var(--teal);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background 0.2s;}
.next-btn:hover,.unlock-btn:hover{background:var(--teal-mid);}
.next-btn:disabled{background:#ccc;cursor:not-allowed;}

.score-wrap{text-align:center;padding:28px 0 12px;}
.score-circle{width:90px;height:90px;border-radius:50%;border:5px solid var(--teal-mid);display:inline-flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:var(--teal);margin-bottom:10px;}
.score-msg{font-size:16px;font-weight:600;color:var(--mid);}
</style>
</head>
<body>

<header>
  <h1>L7 TED Talks В· е–®еӯ—еҲҶзө„з·ҙзҝ’</h1>
  <p>е…ұ 21 еҖӢе–®еӯ— В· еҲҶ 4 зө„ В· жҜҸзө„дёүй—ң</p>
</header>

<div class="progress-wrap">
  <div class="prog-label">
    <span>ж•ҙй«”йҖІеәҰ</span>
    <span id="prog-text">0 / 4 зө„е®ҢжҲҗ</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="group-tabs" id="group-tabs">
  <button class="group-tab active" id="tab-0">зө„ 1пјҡ#1вҖ“5</button>
  <button class="group-tab locked" id="tab-1">зө„ 2пјҡ#6вҖ“10 рҹ”’</button>
  <button class="group-tab locked" id="tab-2">зө„ 3пјҡ#11вҖ“16 рҹ”’</button>
  <button class="group-tab locked" id="tab-3">зө„ 4пјҡ#17вҖ“21 рҹ”’</button>
</div>

<main id="main-area"></main>

<script>
const W=[
  {en:'seek',ph:'[siЛҗk]',pos:'vt.',zh:'е°ӢжұӮпјӣе°Ӣжүҫ',col:'seek help',ex:'She <b>seeks</b> help.',ans:['seek','sought','seeks']},
  {en:'audience',ph:'[ЛҲЙ”ЛҗdiЙҷns]',pos:'n.',zh:'и§ҖзңҫпјӣиҒҪзңҫ',col:'audience ofвҖҰ',ex:'The <b>audience</b> claps.',ans:['audience']},
  {en:'series',ph:'[ЛҲsЙӘriz]',pos:'n.',zh:'зі»еҲ—',col:'a series ofвҖҰ',ex:'a <b>series</b> of books',ans:['series']},
  {en:'technology',ph:'[tЙӣkЛҲnЙ‘lЙҷdК’i]',pos:'n.',zh:'з§‘жҠҖ',col:'medical technology',ex:'New <b>technology</b> helps us.',ans:['technology']},
  {en:'worth',ph:'[wЙңЛҗrОё]',pos:'adj.',zh:'еҖјеҫ—вҖҰвҖҰзҡ„',col:'worth + V-ing',ex:'This film is <b>worth</b> watching.',ans:['worth']},
  {en:'foundation',ph:'[faКҠnЛҲdeКғЙҷn]',pos:'n.',zh:'еҹәйҮ‘жңғпјӣеҹәзӨҺ',col:'set up a foundation',ex:'He set up a <b>foundation</b>.',ans:['foundation']},
  {en:'conference',ph:'[ЛҲkЙ‘nfЙҷrЙҷns]',pos:'n.',zh:'жңғиӯ°пјӣз ”иЁҺжңғ',col:'attend a conference',ex:'We attend a <b>conference</b>.',ans:['conference']},
  {en:'increasingly',ph:'[ЙӘnЛҲkrisiЕӢli]',pos:'adv.',zh:'ж„ҲдҫҶж„ҲвҖҰвҖҰ',col:'еҸҚзҫ©пјҡdecreasingly',ex:'It gets <b>increasingly</b> hot.',ans:['increasingly']},
  {en:'organizer',ph:'[ЛҲЙ”rgЙҷnaЙӘzЙҷr]',pos:'n.',zh:'зө„з№”иҖ…пјӣзұҢиҫҰиҖ…',col:'organize / organization',ex:'She is the <b>organizer</b>.',ans:['organizer']},
  {en:'broad',ph:'[brЙ”Лҗd]',pos:'adj.',zh:'е»Јжіӣзҡ„пјӣеҜ¬й—Ҡзҡ„',col:'a broad range of',ex:'He has <b>broad</b> knowledge.',ans:['broad']},
  {en:'range',ph:'[reЙӘndК’]',pos:'n.',zh:'зЁ®йЎһпјӣзҜ„еңҚ',col:'a range ofвҖҰ',ex:'a <b>range</b> of topics',ans:['range']},
  {en:'field',ph:'[fiЛҗld]',pos:'n.',zh:'й ҳеҹҹпјӣз”°ең°',col:'in the field of',ex:'She works in the <b>field</b> of art.',ans:['field']},
  {en:'philosophy',ph:'[fЙҷЛҲlЙ‘sЙҷfi]',pos:'n.',zh:'е“Іеӯё',col:'philosopher',ex:'She studies <b>philosophy</b>.',ans:['philosophy']},
  {en:'launch',ph:'[lЙ”ЛҗntКғ]',pos:'vt.',zh:'зҷјиЎҢпјӣзҷјиө·пјӣзҷје°„',col:'launch a product',ex:'They <b>launched</b> a new app.',ans:['launch','launched']},
  {en:'collection',ph:'[kЙҷЛҲlЙӣkКғЙҷn]',pos:'n.',zh:'дёҖжү№пјӣж”¶и—Ҹе“Ғ',col:'a collection ofвҖҰ',ex:'a <b>collection</b> of stamps',ans:['collection']},
  {en:'numerous',ph:'[ЛҲnjuЛҗmЙҷrЙҷs]',pos:'adj.',zh:'иЁұеӨҡзҡ„',col:'еҗҢпјҡmany',ex:'There are <b>numerous</b> books.',ans:['numerous']},
  {en:'celebrity',ph:'[sЙҷЛҲlЙӣbrЙҷti]',pos:'n.',zh:'еҗҚдәә',col:'international celebrity',ex:'He is a <b>celebrity</b>.',ans:['celebrity']},
  {en:'fascination',ph:'[ЛҢfГҰsnЛҲeКғЙҷn]',pos:'n.',zh:'и‘—иҝ·пјӣеҗёеј•еҠӣ',col:'in fascination / fascinate',ex:'He watched in <b>fascination</b>.',ans:['fascination']},
  {en:'fiction',ph:'[ЛҲfЙӘkКғЙҷn]',pos:'n.',zh:'е°ҸиӘӘ',col:'science fiction / fictional',ex:'I love science <b>fiction</b>.',ans:['fiction']},
  {en:'discuss',ph:'[dЙӘЛҲskКҢs]',pos:'vt.',zh:'жҺўиЁҺпјӣиЁҺи«–пјҲдёҚеҠ  aboutпјҒпјү',col:'discuss sth. in detail',ex:'We <b>discuss</b> the plan.',ans:['discuss','discussed','discusses']},
  {en:'method',ph:'[ЛҲmЙӣОёЙҷd]',pos:'n.',zh:'ж–№ејҸпјӣж–№жі•',col:'adopt a method of',ex:'This is a good <b>method</b>.',ans:['method']},
];

const GROUPS=[
  {label:'зө„ 1пјҡ#1вҖ“5',  idx:[0,1,2,3,4]},
  {label:'зө„ 2пјҡ#6вҖ“10', idx:[5,6,7,8,9]},
  {label:'зө„ 3пјҡ#11вҖ“16',idx:[10,11,12,13,14,15]},
  {label:'зө„ 4пјҡ#17вҖ“21',idx:[16,17,18,19,20]},
];

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function posClass(pos){return pos.startsWith('n')?'pos-n':pos.startsWith('v')?'pos-v':pos.startsWith('adj')?'pos-adj':'pos-adv';}

const S={group:0,phase:0,done:[false,false,false,false],matchState:[null,null,null,null],mcqAnswered:[0,0,0,0]};

// init tabs
document.querySelectorAll('.group-tab').forEach((t,i)=>{
  t.addEventListener('click',()=>{if(!t.classList.contains('locked'))setGroup(i);});
});

function setGroup(g){
  S.group=g; S.phase=S.done[g]?3:0;
  document.querySelectorAll('.group-tab').forEach((t,i)=>t.classList.toggle('active',i===g));
  render();
}

function setPhase(p){S.phase=p;render();}

function updateProg(){
  const d=S.done.filter(Boolean).length;
  document.getElementById('prog-text').textContent=`${d} / 4 зө„е®ҢжҲҗ`;
  document.getElementById('prog-fill').style.width=`${d*25}%`;
}

function phaseBar(cur){
  return['рҹ“– еӯёзҝ’','вқ“ йҒёж“ҮйЎҢ','рҹ”— й…Қе°Қ'].map((s,i)=>{
    const c=i<cur?'done':i===cur?'current':'pending';
    return`<div class="phase-step ${c}">${i<cur?'вң“ ':''}${s}</div>`;
  }).join('');
}

function render(){
  const g=S.group,p=S.phase,area=document.getElementById('main-area');
  const gWords=GROUPS[g].idx.map(i=>W[i]);
  if(p===0) renderLearn(g,gWords,area);
  else if(p===1) renderMcq(g,gWords,area);
  else if(p===2) renderMatch(g,gWords,area);
  else renderDone(g,area);
}

// в”Җв”Җ LEARN в”Җв”Җ
function renderLearn(g,gWords,area){
  const cards=gWords.map((w,i)=>`
    <div class="learn-card">
      <div class="card-top">
        <span class="card-en">${w.en}</span>
        <span class="card-ph">${w.ph}</span>
        <span class="pos-badge ${posClass(w.pos)}">${w.pos}</span>
      </div>
      <div class="card-zh">${w.zh}</div>
      <div class="card-colloc">жҗӯй…Қпјҡ${w.col}</div><br>
      <div class="card-ex">дҫӢпјҡ${w.ex}</div>
    </div>`).join('');
  area.innerHTML=`<div class="phase-bar">${phaseBar(0)}</div>${cards}
    <button class="next-btn" onclick="setPhase(1)">иЁҳдҪҸдәҶпјҒеҺ»еҒҡйҒёж“ҮйЎҢ вҶ’</button>`;
}

// в”Җв”Җ MCQ в”Җв”Җ
function renderMcq(g,gWords,area){
  const total=gWords.length;
  // build distractor pool from same group
  const items=gWords.map((w,qi)=>{
    const pool=shuf(gWords.filter((_,j)=>j!==qi)).slice(0,3).map(d=>d.zh);
    const opts=shuf([w.zh,...pool]);
    const btns=opts.map(o=>`<button class="mcq-opt" onclick="pickMcq(this,${g},${qi},'${o.replace(/['"]/g,'')}')">${o}</button>`).join('');
    return`<div class="mcq-block" id="mq${g}_${qi}">
      <div class="mcq-q">
        <div class="mcq-qtext">Q${qi+1}. "${w.en}" зҡ„дёӯж–ҮжҳҜпјҹ</div>
        <div class="mcq-options">${btns}</div>
        <div class="feedback" id="mfb${g}_${qi}"></div>
      </div></div>`;
  }).join('');
  area.innerHTML=`<div class="phase-bar">${phaseBar(1)}</div>${items}
    <button class="next-btn" id="toFill" onclick="setPhase(2)" disabled>е…ЁйғЁдҪңзӯ”еҫҢз№јзәҢ вҶ’</button>`;
  S.mcqAnswered[g]=0;
}

function pickMcq(btn,g,qi,chosen){
  const block=document.getElementById(`mq${g}_${qi}`);
  if(block.querySelector('.correct,.wrong')) return;
  const w=W[GROUPS[g].idx[qi]];
  const correct=w.zh;
  block.querySelectorAll('.mcq-opt').forEach(o=>o.disabled=true);
  const isOk=chosen===correct;
  btn.classList.add(isOk?'correct':'wrong');
  if(!isOk) block.querySelectorAll('.mcq-opt').forEach(o=>{if(o.textContent===correct)o.classList.add('correct');});
  const fb=document.getElementById(`mfb${g}_${qi}`);
  fb.className=`feedback ${isOk?'ok':'ng'}`;
  fb.textContent=isOk?'вң“ жӯЈзўәпјҒ':`вң— зӯ”жЎҲпјҡ${correct}`;
  S.mcqAnswered[g]++;
  if(S.mcqAnswered[g]===GROUPS[g].idx.length) document.getElementById('toFill').disabled=false;
}

// в”Җв”Җ MATCH в”Җв”Җ
function renderMatch(g,gWords,area){
  const enItems=gWords.map((w,i)=>({id:i,text:w.en,zh:w.zh}));
  const zhItems=shuf(gWords.map((w,i)=>({id:i,text:w.zh})));
  S.matchState[g]={enItems,zhItems,selectedEn:null,matched:new Set(),total:gWords.length};

  const enCol=enItems.map(item=>`
    <div class="match-item" id="men_${g}_${item.id}" onclick="pickEn(${g},${item.id})">${item.text}</div>
  `).join('');
  const zhCol=zhItems.map(item=>`
    <div class="match-item" id="mzh_${g}_${item.id}" onclick="pickZh(${g},${item.id})">${item.text}</div>
  `).join('');

  area.innerHTML=`<div class="phase-bar">${phaseBar(2)}</div>
    <div class="match-wrap">
      <div class="match-instruct">й»һйҒёе·Ұж¬„иӢұж–ҮпјҢеҶҚй»һеҸіж¬„дёӯж–Үе®ҢжҲҗй…Қе°Қ</div>
      <div class="match-grid">
        <div><div class="match-col-label">иӢұж–Ү</div><div class="match-col">${enCol}</div></div>
        <div><div class="match-col-label">дёӯж–Ү</div><div class="match-col">${zhCol}</div></div>
      </div>
      <div class="match-score" id="mscore_${g}"></div>
    </div>
    <button class="next-btn" id="toDone" onclick="finishGroup(${g})" disabled>е…ЁйғЁй…Қе°ҚеҫҢз№јзәҢ вҶ’</button>`;
}

function pickEn(g,id){
  const ms=S.matchState[g];
  if(!ms||ms.matched.has(id)) return;
  ms.selectedEn=id;
  document.querySelectorAll(`[id^="men_${g}_"]`).forEach(el=>{
    el.classList.toggle('selected', el.id===`men_${g}_${id}` && !ms.matched.has(id));
  });
}

function pickZh(g,id){
  const ms=S.matchState[g];
  if(!ms||ms.selectedEn===null) return;
  const enId=ms.selectedEn;
  if(ms.matched.has(enId)) return;

  const isCorrect=(enId===id);
  const enEl=document.getElementById(`men_${g}_${enId}`);
  const zhEl=document.getElementById(`mzh_${g}_${id}`);

  if(isCorrect){
    enEl.classList.remove('selected');
    enEl.classList.add('matched','locked');
    zhEl.classList.add('matched','locked');
    ms.matched.add(enId);
    ms.selectedEn=null;
    const score=document.getElementById(`mscore_${g}`);
    score.textContent=`вң“ ${ms.matched.size} / ${ms.total} й…Қе°Қе®ҢжҲҗ`;
    if(ms.matched.size===ms.total){
      score.textContent='рҹҺү е…ЁйғЁй…Қе°Қе®ҢжҲҗпјҒ';
      document.getElementById('toDone').disabled=false;
    }
  } else {
    enEl.classList.add('wrong-flash');
    zhEl.classList.add('wrong-flash');
    setTimeout(()=>{
      enEl.classList.remove('wrong-flash');
      zhEl.classList.remove('wrong-flash');
    },600);
  }
}

function finishGroup(g){
  S.done[g]=true;
  if(g<3){
    const nt=document.getElementById(`tab-${g+1}`);
    nt.classList.remove('locked');
    nt.textContent=GROUPS[g+1].label;
  }
  updateProg();
  S.phase=3;
  render();
}

function renderDone(g,area){
  const allDone=S.done.every(Boolean);
  area.innerHTML=`<div class="phase-bar">${phaseBar(3)}</div>
    <div class="score-wrap">
      <div class="score-circle">вң“</div>
      <div class="score-msg" style="margin-bottom:8px">з¬¬ ${g+1} зө„е®ҢжҲҗпјҒ</div>
      ${allDone?'<div style="font-size:15px;color:var(--teal);font-weight:700;margin-top:8px">рҹҺү е…ЁйғЁ 21 еҖӢе–®еӯ—е®ҢжҲҗпјҒ</div>':''}
    </div>
    ${g<3?`<button class="unlock-btn" onclick="setGroup(${g+1})">еҺ»з¬¬ ${g+2} зө„ вҶ’</button>`:''}`;
}

updateProg();
render();
</script>
