<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基礎100字練習系統 Week 1-10</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #9c27b0 0%, #e91e63 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #9c27b0 0%, #e91e63 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .week-selector {
            padding: 30px;
            background: #f8f9fa;
        }

        .week-selector h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .week-btn {
            padding: 20px;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: bold;
        }

        .week-btn:hover {
            border-color: #9c27b0;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(156, 39, 176, 0.3);
        }

        .week-btn.active {
            background: #9c27b0;
            color: white;
            border-color: #9c27b0;
        }

        .week-title {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .week-subtitle {
            font-size: 14px;
            opacity: 0.7;
        }

        .special-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .review-all-btn {
            background: #28a745;
            color: white;
        }

        .review-all-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .mode-selector {
            display: none;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .mode-btn {
            padding: 15px 30px;
            border: 3px solid #9c27b0;
            background: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: #f3e5f5;
        }

        .mode-btn.active {
            background: #9c27b0;
            color: white;
        }

        .progress-container {
            padding: 20px 30px;
            background: white;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #9c27b0 0%, #e91e63 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #9c27b0;
        }

        .stat-label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }

        .practice-area {
            padding: 30px;
        }

        .question-card {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .question-text {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 20px;
            border: 3px solid #9c27b0;
            background: white;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .option-btn:hover {
            background: #f3e5f5;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option-btn.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #28a745;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
        }

        .next-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: #9c27b0;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .next-btn:hover {
            background: #7b1fa2;
            transform: translateY(-2px);
        }

        .word-list {
            padding: 30px;
            background: #f8f9fa;
            display: none;
        }

        .word-list h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .word-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #e9ecef;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-color: #9c27b0;
        }

        .word-en {
            font-size: 20px;
            font-weight: bold;
            color: #9c27b0;
            margin-bottom: 5px;
        }

        .word-zh {
            font-size: 16px;
            color: #6c757d;
        }

        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #9c27b0;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.3s;
            z-index: 1000;
        }

        .home-btn:hover {
            background: #7b1fa2;
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .options {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 36px;
            }
            
            .header h1 {
                font-size: 24px;
            }

            .week-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 基礎100字練習系統</h1>
            <p>Week 1-10 完整學習計畫</p>
        </div>

        <div class="week-selector" id="weekSelector">
            <h2>選擇要練習的週數</h2>
            <div class="week-grid" id="weekGrid">
                <!-- 週次按鈕會在這裡顯示 -->
            </div>
            <button class="special-btn review-all-btn" onclick="reviewAll()">📖 總複習 (100字)</button>
        </div>

        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn active" onclick="setMode('zh-to-en')">看中文選英文</button>
            <button class="mode-btn" onclick="setMode('en-to-zh')">看英文選中文</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0/10</div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="correctCount">0</div>
                    <div class="stat-label">答對</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="wrongCount">0</div>
                    <div class="stat-label">答錯</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="accuracy">0%</div>
                    <div class="stat-label">正確率</div>
                </div>
            </div>
        </div>

        <div class="practice-area" id="practiceArea">
            <!-- 練習題目會在這裡顯示 -->
        </div>

        <div class="word-list" id="wordListSection">
            <h3 id="wordListTitle">本週單字</h3>
            <div class="word-grid" id="wordList">
                <!-- 單字卡片會在這裡顯示 -->
            </div>
        </div>
    </div>

    <button class="home-btn" id="homeBtn" onclick="backToWeekSelector()" style="display: none;" title="返回主頁面">🏠</button>

    <script>
        // 基礎100字 Week 1-10
        const vocabulary = {
            week1: [

                { en: "and", zh: "和", emoji: "➕" },
                { en: "but", zh: "但是", emoji: "⚠️" },

            ],

                { en: "girl", zh: "女孩", emoji: "👧" },
                { en: "family", zh: "家庭", emoji: "👨‍👩‍👧‍👦" },

            ],
            week4: [
                { en: "home", zh: "家", emoji: "🏠" },
                { en: "school", zh: "學校", emoji: "🏫" },
                { en: "office", zh: "辦公室", emoji: "🏢" },
                { en: "store", zh: "商店", emoji: "🏪" },
                { en: "hotel", zh: "飯店", emoji: "🏨" },
                { en: "hospital", zh: "醫院", emoji: "🏥" },
                { en: "bank", zh: "銀行", emoji: "🏦" },
                { en: "world", zh: "世界", emoji: "🌍" },
                { en: "place", zh: "地方", emoji: "🗺️" },
                { en: "city", zh: "城市", emoji: "🏘️" }
            ],
            week5: [
                { en: "thing", zh: "東西", emoji: "📦" },
                { en: "phone", zh: "電話", emoji: "📱" },
                { en: "computer", zh: "電腦", emoji: "💻" },
                { en: "TV", zh: "電視", emoji: "📺" },
                { en: "car", zh: "車", emoji: "🚗" },
                { en: "book", zh: "書", emoji: "📖" },
                { en: "ball", zh: "球", emoji: "🏀" },
                { en: "game", zh: "遊戲", emoji: "🎮" },
                { en: "money", zh: "錢", emoji: "💰" },
                { en: "time", zh: "時間", emoji: "🕰️" }
            ],
            week6: [
                { en: "go", zh: "去", emoji: "▶️" },
                { en: "come", zh: "來", emoji: "🔙" },
                { en: "be", zh: "是/在", emoji: "📍" },
                { en: "have", zh: "有", emoji: "🤲" },
                { en: "do", zh: "做", emoji: "✅" },
                { en: "say", zh: "說", emoji: "🗣️" },
                { en: "tell", zh: "告訴", emoji: "💬" },
                { en: "think", zh: "想/認為", emoji: "💭" },
                { en: "see", zh: "看見", emoji: "🔍" },
                { en: "watch", zh: "看/觀看", emoji: "📺" }
            ],
            week7: [
                { en: "get", zh: "得到/拿", emoji: "🎁" },
                { en: "make", zh: "做/製造", emoji: "🏗️" },
                { en: "know", zh: "知道", emoji: "💡" },

                { en: "need", zh: "需要", emoji: "🎯" },

                { en: "love", zh: "愛/很喜歡", emoji: "💕" },
                { en: "help", zh: "幫助", emoji: "🙋" },
                { en: "play", zh: "玩", emoji: "🎮" },
                { en: "work", zh: "工作", emoji: "💼" }
            ],
            week8: [
                { en: "eat", zh: "吃", emoji: "🍽️" },
                { en: "drink", zh: "喝", emoji: "🥤" },
                { en: "read", zh: "閱讀", emoji: "📚" },
                { en: "write", zh: "寫", emoji: "✍️" },
                { en: "speak", zh: "說話", emoji: "🎤" },
                { en: "listen", zh: "聽", emoji: "👂" },
                { en: "learn", zh: "學習", emoji: "📖" },
                { en: "teach", zh: "教", emoji: "👨‍🏫" },
                { en: "study", zh: "學習/讀書", emoji: "📝" },
                { en: "find", zh: "找到", emoji: "🔎" }
            ],
            week9: [
                { en: "big", zh: "大的", emoji: "⬆️" },
                { en: "small", zh: "小的", emoji: "⬇️" },
                { en: "good", zh: "好的", emoji: "😊" },
                { en: "bad", zh: "壞的", emoji: "😞" },
                { en: "new", zh: "新的", emoji: "🆕" },
                { en: "old", zh: "舊的/老的", emoji: "👴" },
                { en: "long", zh: "長的", emoji: "📏" },
                { en: "short", zh: "短的/矮的", emoji: "📐" },
                { en: "high", zh: "高的", emoji: "📈" },
                { en: "low", zh: "低的", emoji: "📉" }
            ],
            week10: [
                { en: "what", zh: "什麼", emoji: "❓" },
                { en: "who", zh: "誰", emoji: "🙋" },
                { en: "where", zh: "哪裡", emoji: "📍" },
                { en: "when", zh: "什麼時候", emoji: "⏰" },
                { en: "why", zh: "為什麼", emoji: "🤔" },
                { en: "how", zh: "如何/怎麼", emoji: "🔧" },
                { en: "this", zh: "這個", emoji: "👉" },
                { en: "that", zh: "那個", emoji: "👈" },
                { en: "yes", zh: "是的", emoji: "✅" },
                { en: "no", zh: "不", emoji: "❌" }
            ]
        };

        const weekInfo = {
            week1: { title: "Week 1", subtitle: "人稱代名詞" },
            week2: { title: "Week 2", subtitle: "be動詞與基礎字" },
            week3: { title: "Week 3", subtitle: "家人與人" },
            week4: { title: "Week 4", subtitle: "地方" },
            week5: { title: "Week 5", subtitle: "事物" },
            week6: { title: "Week 6", subtitle: "動作動詞(1)" },
            week7: { title: "Week 7", subtitle: "動作動詞(2)" },
            week8: { title: "Week 8", subtitle: "動作動詞(3)" },
            week9: { title: "Week 9", subtitle: "形容詞" },
            week10: { title: "Week 10", subtitle: "疑問詞與其他" }
        };

        let currentWeek = null;
        let currentMode = 'zh-to-en';
        let currentQuestion = 0;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let questions = [];
        let answered = false;

        // 初始化
        function init() {
            displayWeekSelector();
        }

        // 顯示週次選擇
        function displayWeekSelector() {
            const weekGrid = document.getElementById('weekGrid');
            weekGrid.innerHTML = Object.keys(vocabulary).map((week, index) => {
                const info = weekInfo[week];
                return `
                    <div class="week-btn" onclick="selectWeek('${week}')">
                        <div class="week-title">${info.title}</div>
                        <div class="week-subtitle">${info.subtitle}</div>
                    </div>
                `;
            }).join('');
        }

        // 選擇週次
        function selectWeek(week) {
            currentWeek = week;
            document.getElementById('weekSelector').style.display = 'none';
            document.getElementById('modeSelector').style.display = 'flex';
            document.getElementById('wordListSection').style.display = 'block';
            document.getElementById('homeBtn').style.display = 'block';
            document.getElementById('wordListTitle').textContent = 
                `${weekInfo[week].title} - ${weekInfo[week].subtitle}`;
            displayWordList(vocabulary[week]);
            startPractice();
        }

        // 總複習
        function reviewAll() {
            currentWeek = 'all';
            document.getElementById('weekSelector').style.display = 'none';
            document.getElementById('modeSelector').style.display = 'flex';
            document.getElementById('wordListSection').style.display = 'block';
            document.getElementById('homeBtn').style.display = 'block';
            document.getElementById('wordListTitle').textContent = '總複習 - 100個單字';
            
            const allWords = Object.values(vocabulary).flat();
            displayWordList(allWords);
            startPractice();
        }

        // 顯示單字列表
        function displayWordList(words) {
            const wordList = document.getElementById('wordList');
            wordList.innerHTML = words.map(word => `
                <div class="word-card" onclick="speakWord('${word.en}')">
                    <div style="font-size: 50px; margin-bottom: 10px;">${word.emoji}</div>
                    <div class="word-en">${word.en}</div>
                    <div class="word-zh">${word.zh}</div>
                </div>
            `).join('');
        }

        // 語音朗讀
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }

        // 設定模式
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            startPractice();
        }

        // 開始練習
        function startPractice() {
            currentQuestion = 0;
            correctAnswers = 0;
            wrongAnswers = 0;
            answered = false;

            const words = currentWeek === 'all' 
                ? Object.values(vocabulary).flat()
                : vocabulary[currentWeek];

            questions = shuffle([...words]);
            updateStats();
            showQuestion();
        }

        // 洗牌
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 顯示問題
        function showQuestion() {
            if (currentQuestion >= questions.length) {
                showComplete();
                return;
            }

            answered = false;
            const question = questions[currentQuestion];
            const allWords = currentWeek === 'all'
                ? Object.values(vocabulary).flat()
                : vocabulary[currentWeek];

            let wrongOptions = shuffle(allWords.filter(w => 
                currentMode === 'zh-to-en' 
                    ? w.en !== question.en 
                    : w.zh !== question.zh
            )).slice(0, 3);

            let options = shuffle([...wrongOptions, question]);

            const practiceArea = document.getElementById('practiceArea');
            
            if (currentMode === 'zh-to-en') {
                practiceArea.innerHTML = `
                    <div class="question-card">
                        <div class="question-text">${question.emoji} ${question.zh}</div>
                        <div class="options">
                            ${options.map(opt => `
                                <button class="option-btn" onclick="checkAnswer('${opt.en.replace(/'/g, "\\'")}', '${question.en.replace(/'/g, "\\'")}')">
                                    ${opt.en}
                                </button>
                            `).join('')}
                        </div>
                        <div id="feedback"></div>
                    </div>
                `;
            } else {
                practiceArea.innerHTML = `
                    <div class="question-card">
                        <div class="question-text">${question.emoji} ${question.en}</div>
                        <div class="options">
                            ${options.map(opt => `
                                <button class="option-btn" onclick="checkAnswer('${opt.zh}', '${question.zh}')">
                                    ${opt.zh}
                                </button>
                            `).join('')}
                        </div>
                        <div id="feedback"></div>
                    </div>
                `;
            }
        }

        // 檢查答案
        function checkAnswer(selected, correct) {
            if (answered) return;
            answered = true;

            const buttons = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedback');

            buttons.forEach(btn => {
                btn.style.pointerEvents = 'none';
                if (btn.textContent.trim() === correct) {
                    btn.classList.add('correct');
                } else if (btn.textContent.trim() === selected) {
                    btn.classList.add('wrong');
                }
            });

            if (selected === correct) {
                correctAnswers++;
                feedback.className = 'feedback correct';
                feedback.innerHTML = `
                    ✅ 正確!
                    <button class="next-btn" onclick="nextQuestion()">下一題</button>
                `;
                speakWord(questions[currentQuestion].en);
            } else {
                wrongAnswers++;
                feedback.className = 'feedback wrong';
                feedback.innerHTML = `
                    ❌ 答錯了! 正確答案是: <strong>${correct}</strong>
                    <button class="next-btn" onclick="nextQuestion()">下一題</button>
                `;
            }

            updateStats();
        }

        // 下一題
        function nextQuestion() {
            currentQuestion++;
            updateStats();
            showQuestion();
        }

        // 更新統計
        function updateStats() {
            const total = correctAnswers + wrongAnswers;
            const accuracy = total > 0 ? Math.round((correctAnswers / total) * 100) : 0;

            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('wrongCount').textContent = wrongAnswers;
            document.getElementById('accuracy').textContent = accuracy + '%';

            const progress = (currentQuestion / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressFill').textContent = `${currentQuestion}/${questions.length}`;
        }

        // 顯示完成畫面
        function showComplete() {
            const accuracy = Math.round((correctAnswers / (correctAnswers + wrongAnswers)) * 100);
            const practiceArea = document.getElementById('practiceArea');

            let message = '';
            let emoji = '';
            if (accuracy === 100) {
                message = '完美!全部答對!';
                emoji = '🏆';
            } else if (accuracy >= 80) {
                message = '很棒!繼續加油!';
                emoji = '🎉';
            } else if (accuracy >= 60) {
                message = '不錯!再多練習!';
                emoji = '👍';
            } else {
                message = '加油!你可以的!';
                emoji = '💪';
            }

            practiceArea.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 80px; margin-bottom: 20px;">${emoji}</div>
                    <h2 style="font-size: 32px; color: #9c27b0; margin-bottom: 20px;">${message}</h2>
                    <div style="font-size: 24px; margin-bottom: 30px;">
                        <p>答對: <strong style="color: #28a745;">${correctAnswers}</strong></p>
                        <p>答錯: <strong style="color: #dc3545;">${wrongAnswers}</strong></p>
                        <p>正確率: <strong style="color: #9c27b0;">${accuracy}%</strong></p>
                    </div>
                    <button class="next-btn" onclick="startPractice()">再練習一次</button>
                    <button class="next-btn" style="background: #6c757d;" onclick="backToWeekSelector()">返回主頁面</button>
                </div>
            `;
        }

        // 返回週次選擇
        function backToWeekSelector() {
            document.getElementById('weekSelector').style.display = 'block';
            document.getElementById('modeSelector').style.display = 'none';
            document.getElementById('wordListSection').style.display = 'none';
            document.getElementById('homeBtn').style.display = 'none';
            document.getElementById('practiceArea').innerHTML = '';
            currentWeek = null;
        }

        // 初始化
        init();
    </script>
</body>
</html>
