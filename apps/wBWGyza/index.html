<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學測高頻單字練習</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --border: #E2E8F0;
        }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: var(--card);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
            min-width: 100px;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
        }
        
        .stat-value.correct { color: var(--success); }
        .stat-value.wrong { color: var(--error); }
        .stat-value.total { color: var(--primary); }
        
        /* Mode Selection */
        .mode-selection {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid var(--border);
            background: var(--card);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .mode-btn:hover {
            border-color: var(--primary-light);
            background: #F5F3FF;
        }
        
        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .mode-btn.wrong-mode {
            border-color: var(--error);
            color: var(--error);
        }
        
        .mode-btn.wrong-mode:hover {
            background: #FEF2F2;
        }
        
        .mode-btn.wrong-mode.active {
            background: var(--error);
            color: white;
        }
        
        /* Wrong count badge */
        .wrong-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--error);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            margin-left: 6px;
            padding: 0 6px;
        }
        
        .mode-btn.wrong-mode.active .wrong-count-badge {
            background: white;
            color: var(--error);
        }
        
        /* Card */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .question-number {
            text-align: center;
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .word-display {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .english-word {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .word-pos {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 15px;
        }
        
        /* Sound Button */
        .sound-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        
        .sound-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        
        .sound-btn:active {
            transform: scale(0.98);
        }
        
        .sound-btn .icon {
            font-size: 1.2rem;
        }
        
        .sound-btn.playing {
            animation: pulse 0.5s ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Options */
        .options {
            display: grid;
            gap: 12px;
        }
        
        .option-btn {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            background: var(--card);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .option-btn:hover:not(.disabled) {
            border-color: var(--primary-light);
            background: #FAFAFE;
            transform: translateX(4px);
        }
        
        .option-btn .option-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-light);
            flex-shrink: 0;
        }
        
        .option-btn.correct {
            border-color: var(--success);
            background: #ECFDF5;
        }
        
        .option-btn.correct .option-letter {
            background: var(--success);
            color: white;
        }
        
        .option-btn.wrong {
            border-color: var(--error);
            background: #FEF2F2;
        }
        
        .option-btn.wrong .option-letter {
            background: var(--error);
            color: white;
        }
        
        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }
        
        /* Feedback */
        .feedback {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .feedback.show { display: block; }
        
        .feedback.correct {
            background: #ECFDF5;
            color: #047857;
        }
        
        .feedback.wrong {
            background: #FEF2F2;
            color: #B91C1C;
        }
        
        .feedback .example {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-light);
            font-style: italic;
        }
        
        .feedback .example-sound-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary-light);
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
            transition: all 0.2s;
        }
        
        .feedback .example-sound-btn:hover {
            background: rgba(79, 70, 229, 0.2);
        }
        
        /* Next Button */
        .next-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
            transition: all 0.2s;
        }
        
        .next-btn:hover {
            background: #4338CA;
            transform: translateY(-2px);
        }
        
        .next-btn.show { display: block; }
        
        /* Result Screen */
        .result-screen {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }
        
        .result-screen.show { display: block; }
        
        .result-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .result-score {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
        }
        
        .result-message {
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .result-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .restart-btn {
            padding: 14px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .restart-btn:hover {
            background: #4338CA;
            transform: scale(1.05);
        }
        
        /* Wrong Words Review */
        .wrong-review {
            margin-top: 30px;
            text-align: left;
        }
        
        .wrong-review h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .clear-wrong-btn {
            padding: 8px 16px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .clear-wrong-btn:hover {
            background: #DC2626;
            transform: scale(1.05);
        }
        
        .wrong-word-item {
            background: #FEF2F2;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .wrong-word-item .word-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .wrong-word-item .word {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        
        .wrong-word-item .meaning {
            color: var(--text-light);
        }
        
        .wrong-word-item .mini-sound-btn {
            padding: 5px 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .wrong-word-item .mini-sound-btn:hover {
            background: var(--primary-dark);
        }
        
        /* No wrong words message */
        .no-wrong-words {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        
        .no-wrong-words .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .english-word {
                font-size: 2rem;
            }
            
            .card {
                padding: 25px 20px;
            }
            
            .stats-bar {
                gap: 10px;
            }
            
            .stat-item {
                padding: 10px 15px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 學測高頻單字練習</h1>
            <p>Level 2-4 投資報酬率最高的單字｜點擊 🔊 聽發音</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">正確</div>
                <div class="stat-value correct" id="correctCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">錯誤</div>
                <div class="stat-value wrong" id="wrongCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">正確率</div>
                <div class="stat-value total" id="accuracy">0%</div>
            </div>
        </div>
        
        <div class="mode-selection">
            <button class="mode-btn active" data-mode="all">全部單字</button>
            <button class="mode-btn" data-mode="10">隨機 10 題</button>
            <button class="mode-btn" data-mode="20">隨機 20 題</button>
            <button class="mode-btn wrong-mode" data-mode="wrong">複習錯題 <span class="wrong-count-badge" id="wrongBadge">0</span></button>
        </div>
        
        <div class="card" id="quizCard">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="question-number" id="questionNumber">第 1 題 / 共 10 題</div>
            
            <div class="word-display">
                <div class="english-word" id="englishWord">ability</div>
                <div class="word-pos" id="wordPos">(n.)</div>
                <button class="sound-btn" id="soundBtn" onclick="playSound()">
                    <span class="icon">🔊</span>
                    <span>聽發音</span>
                </button>
            </div>
            
            <div class="options" id="options">
                <!-- Options will be inserted here -->
            </div>
            
            <div class="feedback" id="feedback">
                <span id="feedbackText"></span>
                <div class="example" id="exampleSentence"></div>
                <button class="example-sound-btn" id="exampleSoundBtn" onclick="playExampleSound()">
                    🔊 聽例句發音
                </button>
            </div>
            
            <button class="next-btn" id="nextBtn">下一題 →</button>
        </div>
        
        <div class="result-screen" id="resultScreen">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">練習完成！</div>
            <div class="result-score" id="resultScore">8/10</div>
            <div class="result-message" id="resultMessage">
                做得很好！繼續保持這個學習節奏。
            </div>
            <div class="result-buttons">
                <button class="restart-btn" id="restartBtn">再練習一次</button>
            </div>
            
            <div class="wrong-review" id="wrongReview" style="display: none;">
                <h3>
                    <span>📝 需要加強的單字：</span>
                    <button class="clear-wrong-btn" onclick="clearWrongWords()">🗑️ 清除全部錯題</button>
                </h3>
                <div id="wrongWordsList"></div>
            </div>
        </div>
    </div>

    <script>

            { word: "source", pos: "n.", meaning: "來源", example: "What's the source of this news?" },
            { word: "specific", pos: "adj.", meaning: "特定的", example: "Give me a specific example." },
            { word: "stress", pos: "n./v.", meaning: "壓力；強調", example: "I'm under a lot of stress." },
            { word: "successful", pos: "adj.", meaning: "成功的", example: "He is a successful businessman." },
            { word: "suggest", pos: "v.", meaning: "建議", example: "I suggest that you rest." },
            { word: "support", pos: "n./v.", meaning: "支持", example: "I support your decision." },
            { word: "therefore", pos: "adv.", meaning: "因此", example: "Therefore, I agree with you." },
            { word: "tradition", pos: "n.", meaning: "傳統", example: "It's a family tradition." },
            { word: "various", pos: "adj.", meaning: "各種的", example: "There are various reasons." },
            { word: "volunteer", pos: "n./v.", meaning: "志工；自願", example: "I volunteer at the hospital." },
            { word: "according", pos: "prep.", meaning: "根據", example: "According to the report..." },
            { word: "announce", pos: "v.", meaning: "宣布", example: "They announced the winner." },
            { word: "attempt", pos: "n./v.", meaning: "嘗試", example: "He made an attempt to escape." },
            { word: "attend", pos: "v.", meaning: "參加；出席", example: "I will attend the meeting." },
            { word: "behavior", pos: "n.", meaning: "行為", example: "His behavior was strange." },
            { word: "believe", pos: "v.", meaning: "相信", example: "I believe in you." },
            { word: "belong", pos: "v.", meaning: "屬於", example: "This book belongs to me." },
            { word: "comment", pos: "n./v.", meaning: "評論", example: "Please leave a comment." },
            { word: "complete", pos: "adj./v.", meaning: "完整的；完成", example: "The project is complete." },
            { word: "complex", pos: "adj.", meaning: "複雜的", example: "It's a complex problem." },
            { word: "contain", pos: "v.", meaning: "包含", example: "This box contains books." },
            { word: "continue", pos: "v.", meaning: "繼續", example: "Please continue reading." },
            { word: "contribute", pos: "v.", meaning: "貢獻", example: "He contributed to the project." },
            { word: "convenient", pos: "adj.", meaning: "方便的", example: "It's very convenient here." },
            { word: "current", pos: "adj.", meaning: "目前的", example: "The current situation is bad." },
            { word: "demand", pos: "n./v.", meaning: "需求；要求", example: "There is high demand for it." },
            { word: "describe", pos: "v.", meaning: "描述", example: "Describe your experience." },
            { word: "desire", pos: "n./v.", meaning: "渴望", example: "I have no desire to go." }
        ];

        // 語音合成
        let synth = window.speechSynthesis;
        let currentWord = null;
        let currentExample = null;

        // 播放單字發音
        function playSound() {
            if (!currentWord) return;
            
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            utterance.pitch = 1;
            
            const btn = document.getElementById('soundBtn');
            btn.classList.add('playing');
            setTimeout(() => btn.classList.remove('playing'), 500);
            
            synth.speak(utterance);
        }

        // 播放例句發音
        function playExampleSound() {
            if (!currentExample) return;
            
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(currentExample);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.pitch = 1;
            
            synth.speak(utterance);
        }

        // 播放指定單字（用於錯題複習）
        function playWordSound(word) {
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            utterance.pitch = 1;
            
            synth.speak(utterance);
        }

        // 遊戲狀態
        let currentQuestions = [];
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let sessionWrongWords = []; // 本次練習的錯題
        let answered = false;

        // DOM 元素
        const quizCard = document.getElementById('quizCard');
        const resultScreen = document.getElementById('resultScreen');
        const englishWord = document.getElementById('englishWord');
        const wordPos = document.getElementById('wordPos');
        const options = document.getElementById('options');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedbackText');
        const exampleSentence = document.getElementById('exampleSentence');
        const nextBtn = document.getElementById('nextBtn');
        const questionNumber = document.getElementById('questionNumber');
        const progressFill = document.getElementById('progressFill');
        const correctCountEl = document.getElementById('correctCount');
        const wrongCountEl = document.getElementById('wrongCount');
        const accuracyEl = document.getElementById('accuracy');
        const wrongBadge = document.getElementById('wrongBadge');

        // 更新錯題數量顯示
        function updateWrongBadge() {
            const savedWrongWords = JSON.parse(localStorage.getItem('wrongWords') || '[]');
            wrongBadge.textContent = savedWrongWords.length;
        }

        // 初始化模式按鈕
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                startQuiz(btn.dataset.mode);
            });
        });

        // 下一題按鈕
        nextBtn.addEventListener('click', () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        });

        // 重新開始
        document.getElementById('restartBtn').addEventListener('click', () => {
            const activeMode = document.querySelector('.mode-btn.active').dataset.mode;
            startQuiz(activeMode);
        });

        // 清除錯題
        function clearWrongWords() {
            if (confirm('確定要清除所有錯題嗎？')) {
                localStorage.removeItem('wrongWords');
                updateWrongBadge();
                alert('已清除所有錯題！');
                // 重新顯示結果頁面
                showResult();
            }
        }

        // 開始測驗
        function startQuiz(mode) {
            synth.cancel();
            
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            sessionWrongWords = [];
            
            const savedWrongWords = JSON.parse(localStorage.getItem('wrongWords') || '[]');
            
            if (mode === 'wrong') {
                if (savedWrongWords.length === 0) {
                    alert('目前沒有錯題記錄！先做其他練習吧。');
                    return;
                }
                currentQuestions = savedWrongWords.map(w => 
                    vocabulary.find(v => v.word === w)
                ).filter(Boolean);
                shuffleArray(currentQuestions);
            } else if (mode === 'all') {
                currentQuestions = [...vocabulary];
                shuffleArray(currentQuestions);
            } else {
                const count = parseInt(mode);
                currentQuestions = [...vocabulary];
                shuffleArray(currentQuestions);
                currentQuestions = currentQuestions.slice(0, count);
            }
            
            quizCard.style.display = 'block';
            resultScreen.classList.remove('show');
            updateStats();
            showQuestion();
        }

        // 顯示題目
        function showQuestion() {
            answered = false;
            const current = currentQuestions[currentIndex];
            
            currentWord = current.word;
            currentExample = current.example;
            
            englishWord.textContent = current.word;
            wordPos.textContent = `(${current.pos})`;
            questionNumber.textContent = `第 ${currentIndex + 1} 題 / 共 ${currentQuestions.length} 題`;
            progressFill.style.width = `${((currentIndex) / currentQuestions.length) * 100}%`;
            
            const wrongOptions = vocabulary
                .filter(v => v.word !== current.word)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
                .map(v => v.meaning);
            
            const allOptions = [current.meaning, ...wrongOptions];
            shuffleArray(allOptions);
            
            options.innerHTML = allOptions.map((opt, i) => `
                <button class="option-btn" data-meaning="${opt}">
                    <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                    <span>${opt}</span>
                </button>
            `).join('');
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => checkAnswer(btn, current));
            });
            
            feedback.classList.remove('show', 'correct', 'wrong');
            nextBtn.classList.remove('show');
        }

        // 檢查答案
        function checkAnswer(selectedBtn, current) {
            if (answered) return;
            answered = true;
            
            const selectedMeaning = selectedBtn.dataset.meaning;
            const isCorrect = selectedMeaning === current.meaning;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.add('disabled');
                if (btn.dataset.meaning === current.meaning) {
                    btn.classList.add('correct');
                } else if (btn === selectedBtn && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });
            
            feedback.classList.add('show');
            if (isCorrect) {
                correctCount++;
                feedback.classList.add('correct');
                feedbackText.textContent = '✓ 正確！';
            } else {
                wrongCount++;
                sessionWrongWords.push(current.word);
                feedback.classList.add('wrong');
                feedbackText.textContent = `✗ 答錯了！正確答案是「${current.meaning}」`;
            }
            exampleSentence.textContent = current.example;
            
            updateStats();
            nextBtn.classList.add('show');
            
            // 儲存錯題（只加入，不自動移除）
            saveWrongWords();
        }

        // 更新統計
        function updateStats() {
            correctCountEl.textContent = correctCount;
            wrongCountEl.textContent = wrongCount;
            const total = correctCount + wrongCount;
            accuracyEl.textContent = total > 0 ? `${Math.round(correctCount / total * 100)}%` : '0%';
        }

        // 顯示結果
        function showResult() {
            quizCard.style.display = 'none';
            resultScreen.classList.add('show');
            
            const total = currentQuestions.length;
            const percent = Math.round(correctCount / total * 100);
            
            document.getElementById('resultScore').textContent = `${correctCount}/${total}`;
            
            const resultIcon = document.getElementById('resultIcon');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            
            if (percent >= 90) {
                resultIcon.textContent = '🏆';
                resultTitle.textContent = '太厲害了！';
                resultMessage.textContent = '你對這些單字已經非常熟悉了！繼續保持！';
            } else if (percent >= 70) {
                resultIcon.textContent = '🎉';
                resultTitle.textContent = '做得很好！';
                resultMessage.textContent = '大部分單字都記住了，再加把勁！';
            } else if (percent >= 50) {
                resultIcon.textContent = '💪';
                resultTitle.textContent = '繼續加油！';
                resultMessage.textContent = '還有進步空間，多練習幾次會更好！';
            } else {
                resultIcon.textContent = '📚';
                resultTitle.textContent = '需要多練習';
                resultMessage.textContent = '建議先看一遍單字表，再來練習會更有效果。';
            }
            
            // 顯示所有累積的錯題
            const wrongReview = document.getElementById('wrongReview');
            const wrongWordsList = document.getElementById('wrongWordsList');
            const allWrongWords = JSON.parse(localStorage.getItem('wrongWords') || '[]');
            
            if (allWrongWords.length > 0) {
                wrongReview.style.display = 'block';
                wrongWordsList.innerHTML = allWrongWords.map(w => {
                    const wordData = vocabulary.find(v => v.word === w);
                    if (!wordData) return '';
                    return `
                        <div class="wrong-word-item">
                            <div class="word-info">
                                <span class="word">${wordData.word}</span>
                                <button class="mini-sound-btn" onclick="playWordSound('${wordData.word}')">🔊</button>
                            </div>
                            <span class="meaning">${wordData.meaning}</span>
                        </div>
                    `;
                }).join('');
            } else {
                wrongReview.style.display = 'none';
            }
            
            updateWrongBadge();
        }

        // 儲存錯題到 localStorage（只加入新錯題，不自動移除）
        function saveWrongWords() {
            const saved = JSON.parse(localStorage.getItem('wrongWords') || '[]');
            
            // 只加入新的錯題
            sessionWrongWords.forEach(w => {
                if (!saved.includes(w)) {
                    saved.push(w);
                }
            });
            
            localStorage.setItem('wrongWords', JSON.stringify(saved));
            updateWrongBadge();
        }

        // 洗牌函數
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 啟動
        updateWrongBadge();
        startQuiz('10');
    </script>
</body>
</html>
