    body {
        font-family: 'Microsoft JhengHei', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        min-height: 100vh;
    }
    
    .container {
        max-width: 800px;
        margin: 0 auto;
    }
    
    .header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
    }
    
    .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .score-board {
        background: white;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        margin-bottom: 30px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .score {
        font-size: 2em;
        color: #667eea;
        font-weight: bold;
    }
    
    .quiz-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        margin-bottom: 20px;
    }
    
    .question-number {
        color: #667eea;
        font-size: 1.2em;
        margin-bottom: 20px;
        font-weight: bold;
    }
    
    .question-text {
        font-size: 1.5em;
        color: #333;
        margin-bottom: 30px;
        line-height: 1.8;
    }
    
    .options {
        display: grid;
        gap: 15px;
    }
    
    .option-btn {
        background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        border: 3px solid #ff6b6b;
        padding: 20px;
        border-radius: 15px;
        font-size: 1.2em;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: left;
    }
    
    .option-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(255,107,107,0.3);
    }
    
    .option-btn.correct {
        background: linear-gradient(135deg, #a8edea 0%, #4caf50 100%);
        border-color: #2e7d32;
        color: white;
    }
    
    .option-btn.wrong {
        background: linear-gradient(135deg, #ffeaa7 0%, #f44336 100%);
        border-color: #c62828;
        color: white;
    }
    
    .feedback {
        margin-top: 20px;
        padding: 20px;
        border-radius: 10px;
        font-size: 1.1em;
        display: none;
    }
    
    .feedback.show {
        display: block;
    }
    
    .feedback.correct {
        background: #e8f5e9;
        border: 3px solid #4caf50;
        color: #2e7d32;
    }
    
    .feedback.wrong {
        background: #ffebee;
        border: 3px solid #f44336;
        color: #c62828;
    }
    
    .next-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.3em;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 20px;
        display: none;
        box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    
    .next-btn.show {
        display: inline-block;
    }
    
    .next-btn:hover {
        transform: scale(1.05);
    }
    
    .completion {
        text-align: center;
        display: none;
    }
    
    .completion.show {
        display: block;
    }
    
    .completion h2 {
        font-size: 2.5em;
        color: #667eea;
        margin-bottom: 20px;
    }
    
    .restart-btn {
        background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);

        border: none;
        padding: 20px 50px;
        font-size: 1.5em;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 20px;

    .restart-btn:hover {
        transform: scale(1.1);

    <div class="score-board">
        <div style="color: #666; margin-bottom: 10px;">答對題數</div>
        <div class="score"><span id="correct">0</span> / <span id="total">0</span></div>
    </div>
    
    <div class="quiz-card" id="quizCard">
        <div class="question-number" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="nextBtn">下一題 →</button>
    </div>
    
    <div class="quiz-card completion" id="completion">
        <h2>🎉 恭喜完成!</h2>
        <div style="font-size: 1.5em; margin: 20px 0;">
            答對: <span style="color: #4caf50; font-weight: bold;" id="finalScore"></span>
        </div>
        <div id="wrongAnswersSection" style="margin: 20px 0;"></div>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="restart-btn" id="practiceWrongBtn" style="background: linear-gradient(135deg, #ff9800 0%, #e65100 100%); display: none;">📝 練習錯題</button>
            <button class="restart-btn" onclick="location.reload()">🔄 重新測驗</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            question: "秦國和晉國為什麼要攻打鄭國?",
            options: [
                "因為鄭國很有錢,想搶錢",
                "因為鄭國對晉國不禮貌,而且跟楚國有來往",
                "因為鄭國先攻打他們",
                "因為鄭國欠他們錢不還"
            ],
            correct: 1,
            explanation: "✅ 正確!課文第一句就說:「以其無禮於晉,且貳於楚也」"
        },
        {
            question: "鄭文公請誰去當說客?",
            options: [
                "佚之狐",
                "燭之武",
                "子犯",
                "秦穆公"
            ],
            correct: 1,
            explanation: "✅ 沒錯!佚之狐推薦燭之武,鄭文公就去請燭之武"
        },
        {
            question: "燭之武一開始的態度是什麼?",
            options: [
                "很高興,馬上答應",
                "先抱怨自己被埋沒,但後來還是答應了",
                "直接拒絕",
                "要求鄭文公給他很多錢"
            ],
            correct: 1,
            explanation: "✅ 正確!燭之武說:「臣之壯也,猶不如人;今老矣,無能為也已」(抱怨),但後來還是答應了"
        },
        {
            question: "燭之武跟秦穆公說:打下鄭國,對秦國有什麼影響?",
            options: [
                "秦國會變得更強大",
                "秦國離鄭國太遠,拿不到鄭國的土地",
                "秦國會得到很多財寶",
                "鄭國會向秦國投降"
            ],
            correct: 1,
            explanation: "✅ 太棒了!燭之武說:「越國以鄙遠,君知其難也」(越過別的國家來把遠方當邊境,很困難)"
        },
        {
            question: "燭之武建議秦穆公:如果不打鄭國,鄭國可以做什麼?",
            options: [
                "給秦國很多錢",
                "把土地送給秦國",
                "當「東道主」,招待秦國使者",
                "幫秦國打其他國家"
            ],
            correct: 2,
            explanation: "✅ 完全正確!燭之武說:「若舍鄭以為東道主,行李之往來,共其乏困」"
        },
        {
            question: "燭之武用什麼方法挑撥秦晉關係?",
            options: [
                "說晉國很窮",
                "說晉國以前答應給秦國土地,結果沒給",
                "說晉文公很壞",
                "說晉國要攻打秦國"
            ],
            correct: 1,
            explanation: "✅ 答對了!燭之武說晉國「許君焦、瑕,朝濟而夕設版焉」(答應給土地卻沒給)"
        },
        {
            question: "秦穆公聽完燭之武的話之後,做了什麼決定?",
            options: [
                "繼續攻打鄭國",
                "和鄭國簽約,撤軍回國",
                "去攻打晉國",
                "要燭之武當秦國的大臣"
            ],
            correct: 1,
            explanation: "✅ 沒錯!秦穆公「乃與鄭人盟」(和鄭國簽約),然後撤軍"
        },
        {
            question: "晉國大臣子犯建議晉文公做什麼?",
            options: [
                "也撤軍回國",
                "攻打秦軍",
                "繼續攻打鄭國",
                "去跟秦國道歉"
            ],
            correct: 1,
            explanation: "✅ 正確!子犯說:「不如因而遂之」(趁機攻打秦軍)"
        },
        {
            question: "晉文公為什麼拒絕子犯的建議?",
            options: [
                "因為打不贏",
                "因為沒有道義(秦國幫過我們),也沒把握",
                "因為太累了",
                "因為秦國國王是他朋友"
            ],
            correct: 1,
            explanation: "✅ 太厲害了!晉文公說「因人之力而敝之,不仁;失其所與,不知」"
        },
        {
            question: "這個故事最重要的啟示是什麼?",
            options: [
                "打仗很重要",
                "國家一定要很強大",
                "外交辭令很重要,智慧比武力更能解決問題",
                "一定要有很多朋友"
            ],
            correct: 2,
            explanation: "✅ 完美!燭之武用嘴巴就救了整個國家,證明智慧和外交的重要性!"
        }
    ];
    
    let currentQuestion = 0;
    let correctAnswers = 0;
    let answered = false;
    let wrongQuestions = []; // 記錄答錯的題目
    let isPracticeMode = false; // 是否為錯題練習模式
    let practiceQuestions = []; // 錯題練習的題目列表
    
    function loadQuestion() {
        answered = false;
        const questionsList = isPracticeMode ? practiceQuestions : questions;
        const q = questionsList[currentQuestion];
        
        const totalQuestions = isPracticeMode ? practiceQuestions.length : questions.length;
        document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} 題 / 共 ${totalQuestions} 題` + (isPracticeMode ? ' 【錯題練習】' : '');
        document.getElementById('questionText').textContent = q.question;
        document.getElementById('total').textContent = totalQuestions;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = option;
            btn.onclick = () => checkAnswer(index);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
        document.getElementById('nextBtn').classList.remove('show');
    }
    
    function checkAnswer(selected) {
        if (answered) return;
        answered = true;
        
        const questionsList = isPracticeMode ? practiceQuestions : questions;
        const q = questionsList[currentQuestion];
        const options = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        
        if (selected === q.correct) {
            correctAnswers++;
            document.getElementById('correct').textContent = correctAnswers;
            options[selected].classList.add('correct');
            feedback.textContent = q.explanation;
            feedback.classList.add('show', 'correct');
        } else {
            // 記錄答錯的題目
            if (!isPracticeMode) {
                wrongQuestions.push({
                    questionIndex: currentQuestion,
                    question: q
                });
            }
            
            options[selected].classList.add('wrong');
            options[q.correct].classList.add('correct');
            feedback.textContent = '❌ 不對喔!正確答案是:' + q.options[q.correct] + '\n\n' + q.explanation;
            feedback.classList.add('show', 'wrong');
        }
        
        document.getElementById('nextBtn').classList.add('show');
    }
    
    document.getElementById('nextBtn').onclick = function() {
        currentQuestion++;
        const totalQuestions = isPracticeMode ? practiceQuestions.length : questions.length;
        
        if (currentQuestion < totalQuestions) {
            loadQuestion();
        } else {
            showCompletion();
        }
    };
    
    function showCompletion() {
        const totalQuestions = isPracticeMode ? practiceQuestions.length : questions.length;
        document.getElementById('quizCard').style.display = 'none';
        document.getElementById('completion').classList.add('show');
        document.getElementById('finalScore').textContent = `${correctAnswers} / ${totalQuestions}`;
        
        // 顯示錯題資訊
        const wrongSection = document.getElementById('wrongAnswersSection');
        if (!isPracticeMode && wrongQuestions.length > 0) {
            wrongSection.innerHTML = `
                <div style="background: #ffebee; padding: 20px; border-radius: 10px; border: 2px solid #f44336; margin: 20px 0;">
                    <h3 style="color: #c62828; margin-bottom: 15px;">📌 答錯的題目:</h3>
                    <div style="color: #c62828; font-size: 1.1em; line-height: 2;">
                        ${wrongQuestions.map((item, index) => 
                            `${index + 1}. 第${item.questionIndex + 1}題: ${item.question.question.substring(0, 30)}...`
                        ).join('<br>')}
                    </div>
                    <div style="margin-top: 15px; color: #c62828;">
                        <strong>💡 建議:</strong> 點選下方「練習錯題」按鈕,加強練習!
                    </div>
                </div>
            `;
            document.getElementById('practiceWrongBtn').style.display = 'inline-block';
        } else if (isPracticeMode) {
            if (wrongQuestions.length === 0) {
                wrongSection.innerHTML = `
                    <div style="background: #e8f5e9; padding: 20px; border-radius: 10px; border: 2px solid #4caf50;">
                        <h3 style="color: #2e7d32;">🎊 太棒了!錯題全部答對!</h3>
                        <p style="color: #2e7d32; margin-top: 10px;">你已經完全掌握這些題目了!</p>
                    </div>
                `;
            } else {
                wrongSection.innerHTML = `
                    <div style="background: #fff3e0; padding: 20px; border-radius: 10px; border: 2px solid #ff9800;">
                        <h3 style="color: #e65100; margin-bottom: 10px;">還有 ${wrongQuestions.length} 題需要加強</h3>
                        <p style="color: #e65100;">繼續努力!可以再練習一次</p>
                    </div>
                `;
                document.getElementById('practiceWrongBtn').style.display = 'inline-block';
            }
        } else {
            wrongSection.innerHTML = `
                <div style="background: #e8f5e9; padding: 20px; border-radius: 10px; border: 2px solid #4caf50;">
                    <h3 style="color: #2e7d32;">🎊 完美!全部答對!</h3>
                    <p style="color: #2e7d32; margin-top: 10px;">你完全掌握燭之武退秦師了!</p>
                </div>
            `;
        }
    }
    
    // 錯題練習按鈕
    document.getElementById('practiceWrongBtn').onclick = function() {
        // 重置變數
        isPracticeMode = true;
        practiceQuestions = wrongQuestions.map(item => item.question);
        currentQuestion = 0;
        correctAnswers = 0;
        wrongQuestions = []; // 清空錯題記錄,準備記錄新的錯題
        
        // 重置UI
        document.getElementById('correct').textContent = '0';
        document.getElementById('completion').classList.remove('show');
        document.getElementById('quizCard').style.display = 'block';
        
        // 載入第一題
        loadQuestion();
    };
    
    // 開始測驗
    loadQuestion();
</script>
