<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G2 L7 е–®еӯ—еҲҶзө„з·ҙзҝ’</title>
<style>
:root {
  --indigo:      #3d4f9e;
  --indigo-mid:  #5a6fc7;
  --indigo-light:#8fa3e8;
  --indigo-pale: #e8ecfa;
  --indigo-bg:   #f2f4fc;
  --green:       #57cc99;
  --amber:       #c9a227;
  --coral:       #e76f51;
  --gray:        #7a82b0;
  --dark:        #1e2242;
  --mid:         #3a4278;
  --light:       #8089b5;
  --white:       #ffffff;
  --shadow:      0 2px 10px rgba(61,79,158,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--indigo-bg);color:var(--dark);min-height:100vh;}

header{background:var(--indigo);padding:20px 18px 16px;text-align:center;}
header h1{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px;}
header p{color:rgba(255,255,255,0.75);font-size:13px;}

.progress-wrap{background:var(--white);padding:12px 18px;border-bottom:1px solid var(--indigo-pale);}
.prog-label{font-size:12px;color:var(--light);margin-bottom:6px;display:flex;justify-content:space-between;}
.prog-bar{height:6px;background:#d8ddf0;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--indigo-mid);border-radius:99px;transition:width 0.4s;}

.group-tabs{display:flex;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--indigo-pale);}
.group-tab{flex:0 0 auto;padding:10px 18px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;}
.group-tab.active{color:var(--indigo);border-bottom-color:var(--indigo-mid);background:var(--indigo-pale);}
.group-tab.locked{color:#ccc;cursor:not-allowed;}

main{padding:16px 14px 56px;max-width:700px;margin:0 auto;}

.phase-bar{display:flex;gap:6px;margin-bottom:16px;}
.phase-step{flex:1;padding:8px 4px;border-radius:8px;text-align:center;font-size:12px;font-weight:700;}
.phase-step.done{background:var(--green);color:#fff;}
.phase-step.current{background:var(--indigo);color:#fff;}
.phase-step.pending{background:#e5e8f8;color:var(--gray);}

/* Learn cards */
.learn-card{background:var(--white);border-radius:14px;padding:16px 16px 12px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--indigo-light);}
.card-top{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.card-en{font-size:20px;font-weight:700;color:var(--indigo);font-family:'Courier New',monospace;}
.card-ph{font-size:12px;color:var(--light);}
.pos-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.pos-n{background:#dde3fa;color:var(--indigo);}
.pos-v{background:#fdefd0;color:#7a5000;}
.pos-adj{background:#e0f0d0;color:#3a6a00;}
.pos-adv{background:#fce0d8;color:#7a2000;}
.card-zh{font-size:18px;font-weight:700;margin-bottom:6px;}
.card-colloc{font-size:13px;color:var(--indigo-mid);background:var(--indigo-pale);display:inline-block;padding:2px 10px;border-radius:20px;margin-bottom:6px;}
.card-ex{font-size:13px;color:var(--light);font-style:italic;}
.card-ex b{color:var(--indigo);font-style:normal;}

/* MCQ */
.mcq-block{margin-bottom:14px;}
.mcq-q{background:var(--white);border-radius:12px;padding:14px 16px 10px;box-shadow:var(--shadow);}
.mcq-qtext{font-size:15px;font-weight:600;margin-bottom:10px;}
.mcq-options{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.mcq-opt{padding:10px 12px;border:2px solid var(--indigo-pale);border-radius:10px;background:var(--white);font-family:inherit;font-size:14px;color:var(--dark);cursor:pointer;transition:all 0.15s;text-align:left;}
.mcq-opt:hover:not(:disabled){background:var(--indigo-pale);border-color:var(--indigo-light);}
.mcq-opt.correct{background:#d4f5e5;border-color:#57cc99;color:#1a5c35;}
.mcq-opt.wrong{background:#fde4de;border-color:var(--coral);color:#7a2000;}
.mcq-opt:disabled{cursor:default;}
.feedback{font-size:13px;margin-top:6px;padding:5px 10px;border-radius:7px;display:none;}
.feedback.ok{background:#d4f5e5;color:#1a5c35;display:block;}
.feedback.ng{background:#fde4de;color:#7a2000;display:block;}

/* Matching */
.match-wrap{background:var(--white);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
.match-instruct{font-size:13px;color:var(--light);margin-bottom:14px;text-align:center;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;}
.match-col-label{font-size:12px;font-weight:700;color:var(--indigo);text-align:center;padding:4px 0 8px;letter-spacing:1px;}
.match-col{display:flex;flex-direction:column;gap:7px;}
.match-item{padding:10px 12px;border:2px solid var(--indigo-pale);border-radius:10px;background:var(--white);font-family:inherit;font-size:14px;color:var(--dark);cursor:pointer;transition:all 0.15s;text-align:center;user-select:none;}
.match-item:hover:not(.matched):not(.locked){background:var(--indigo-pale);border-color:var(--indigo-light);}
.match-item.selected{background:var(--indigo);color:#fff;border-color:var(--indigo);}
.match-item.matched{background:#d4f5e5;border-color:#57cc99;color:#1a5c35;cursor:default;}
.match-item.wrong-flash{background:#fde4de;border-color:var(--coral);color:#7a2000;}
.match-item.locked{cursor:default;}
.match-score{text-align:center;font-size:14px;font-weight:700;color:var(--indigo);margin-top:12px;min-height:22px;}

/* Buttons */
.next-btn,.unlock-btn{display:block;width:100%;padding:14px;margin-top:16px;border:none;border-radius:12px;background:var(--indigo);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background 0.2s;}
.next-btn:hover,.unlock-btn:hover{background:var(--indigo-mid);}
.next-btn:disabled{background:#ccc;cursor:not-allowed;}

.score-wrap{text-align:center;padding:28px 0 12px;}
.score-circle{width:90px;height:90px;border-radius:50%;border:5px solid var(--indigo-mid);display:inline-flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:var(--indigo);margin-bottom:10px;}
.score-msg{font-size:16px;font-weight:600;color:var(--mid);}
</style>
</head>
<body>

<header>
  <h1>L7 Iceland's Road to Gender Equality В· е–®еӯ—з·ҙзҝ’</h1>
  <p>е…ұ 15 еҖӢе–®еӯ— В· еҲҶ 3 зө„ В· жҜҸзө„дёүй—ң</p>
</header>

<div class="progress-wrap">
  <div class="prog-label">
    <span>ж•ҙй«”йҖІеәҰ</span>
    <span id="prog-text">0 / 3 зө„е®ҢжҲҗ</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="group-tabs" id="group-tabs">
  <button class="group-tab active" id="tab-0">зө„ 1пјҡзӨҫжңғиӯ°йЎҢ #1вҖ“5</button>
  <button class="group-tab locked" id="tab-1">зө„ 2пјҡдәәеҸЈе®¶еәӯ #6вҖ“10 рҹ”’</button>
  <button class="group-tab locked" id="tab-2">зө„ 3пјҡиЎҢеӢ•ж”№и®Ҡ #11вҖ“15 рҹ”’</button>
</div>

<main id="main-area"></main>

<script>
const W=[
  {en:'gender',    ph:'[ЛӢdК’ЙӣndЙҡ]',   pos:'n.',    zh:'жҖ§еҲҘ',          col:'gender stereotype жҖ§еҲҘеҲ»жқҝеҚ°иұЎ', ex:'There should be <b>gender</b> equality at work.',        ans:['gender']},
  {en:'protest',   ph:'[prЙҷЛӢtЙӣst]',  pos:'v./n.', zh:'жҠ—иӯ°пјӣеҸҚе°Қ',    col:'protest against жҠ—иӯ°',           ex:'The workers <b>protested</b> against the new rules.',    ans:['protest','protested','protesting']},
  {en:'injustice', ph:'[ЙӘnЛӢdК’КҢstЙӘs]',pos:'n.',    zh:'дёҚе…¬е№іпјӣдёҚе…¬жӯЈ',col:'injustice against е°ҚвҖҰвҖҰзҡ„дёҚе…¬',   ex:'She fought against the <b>injustice</b> in society.',   ans:['injustice']},
  {en:'discrimination',ph:'[dЙӘЛҸskrЙӘmЙҷЛӢneКғЙҷn]',pos:'n.',zh:'жӯ§иҰ–пјӣеҒҸиў’',col:'discrimination against е°ҚвҖҰвҖҰзҡ„жӯ§иҰ–',ex:'There is still <b>discrimination</b> against women here.',ans:['discrimination']},
  {en:'gap',       ph:'[gГҰp]',        pos:'n.',    zh:'е·®и·қпјӣй–“йҡҷ',    col:'gap between A and B',            ex:'The <b>gap</b> between the rich and poor is growing.',   ans:['gap']},
  {en:'population',ph:'[ЛҸpЙ‘pjЙҷЛӢleКғЙҷn]',pos:'n.', zh:'дәәеҸЈ',          col:'aging population дәәеҸЈй«ҳйҪЎеҢ–',    ex:'Japan has a rapidly aging <b>population</b>.',           ans:['population']},
  {en:'domestic',  ph:'[dЙҷЛӢmЙӣstЙӘk]', pos:'adj.',  zh:'е®¶еәӯзҡ„пјӣеңӢе…§зҡ„',col:'domestic duties е®¶дәӢ',           ex:'Both parents share <b>domestic</b> duties at home.',     ans:['domestic']},
  {en:'chore',     ph:'[tКғЙ”r]',       pos:'n.',    zh:'е®¶дәӢпјӣдҫӢиЎҢе·ҘдҪң',col:'do (the) chores еҒҡе®¶дәӢ',         ex:'Glen hates doing <b>chores</b> like washing the dishes.',ans:['chore','chores']},
  {en:'majority',  ph:'[mЙҷЛӢdК’Й”rЙҷtЙӘ]',pos:'n.',    zh:'еӨ§еӨҡж•ё',        col:'be in the majority еҚ еӨ§еӨҡж•ё',    ex:'The <b>majority</b> of students chose to study online.',  ans:['majority']},
  {en:'chaos',     ph:'[ЛӢkeЙ‘s]',      pos:'n.',    zh:'ж··дәӮ',          col:'in total chaos дәӮжҲҗдёҖеңҳ',        ex:'The accident left the street in total <b>chaos</b>.',    ans:['chaos']},
  {en:'ban',       ph:'[bГҰn]',        pos:'v./n.', zh:'зҰҒжӯўпјӣзҰҒд»Ө',    col:'ban sb. from V-ing зҰҒжӯўжҹҗдәәеҒҡ',  ex:'The city <b>banned</b> all plastic bags last year.',     ans:['ban','banned','banning']},
  {en:'salary',    ph:'[ЛӢsГҰlЙҷrЙӘ]',   pos:'n.',    zh:'и–Әж°ҙ',          col:'on a salary й ҳи–Әж°ҙ',             ex:'Women often earn a lower <b>salary</b> than men.',       ans:['salary']},
  {en:'eliminate', ph:'[ЙӘЛӢlЙӘmЙҷЛҸnet]',pos:'v.',    zh:'ж¶ҲйҷӨ',          col:'eliminate A from B еҫһBдёӯж¶ҲйҷӨA',  ex:'We must <b>eliminate</b> discrimination from society.',  ans:['eliminate','eliminated']},
  {en:'certificate',ph:'[sЙҡЛӢtЙӘfЙҷkЙӘt]',pos:'n.',  zh:'иӯүжҳҺжӣёпјӣж–ҮжҶ‘',  col:'birth certificate еҮәз”ҹиӯүжҳҺ',     ex:'You need a birth <b>certificate</b> to register.',       ans:['certificate']},
  {en:'bold',      ph:'[bold]',        pos:'adj.', zh:'еӨ§иҶҪзҡ„',        col:'bold move еӨ§иҶҪзҡ„иҲүеӢ•',           ex:'It was a <b>bold</b> move to challenge the old rules.',  ans:['bold']},
];

const GROUPS=[
  {label:'зө„ 1пјҡзӨҫжңғиӯ°йЎҢ #1вҖ“5',  idx:[0,1,2,3,4]},
  {label:'зө„ 2пјҡдәәеҸЈе®¶еәӯ #6вҖ“10', idx:[5,6,7,8,9]},
  {label:'зө„ 3пјҡиЎҢеӢ•ж”№и®Ҡ #11вҖ“15',idx:[10,11,12,13,14]},
];

const TOTAL_GROUPS=3;

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function posClass(pos){return pos.startsWith('n')?'pos-n':pos.startsWith('v')?'pos-v':pos.startsWith('adj')?'pos-adj':'pos-adv';}

const S={group:0,phase:0,done:[false,false,false],matchState:[null,null,null],mcqAnswered:[0,0,0]};

document.querySelectorAll('.group-tab').forEach((t,i)=>{
  t.addEventListener('click',()=>{if(!t.classList.contains('locked'))setGroup(i);});
});

function setGroup(g){
  S.group=g; S.phase=S.done[g]?3:0;
  document.querySelectorAll('.group-tab').forEach((t,i)=>t.classList.toggle('active',i===g));
  render();
}

function setPhase(p){S.phase=p;render();}

function updateProg(){
  const d=S.done.filter(Boolean).length;
  document.getElementById('prog-text').textContent=`${d} / ${TOTAL_GROUPS} зө„е®ҢжҲҗ`;
  document.getElementById('prog-fill').style.width=`${Math.round(d/TOTAL_GROUPS*100)}%`;
}

function phaseBar(cur){
  return['рҹ“– еӯёзҝ’','вқ“ йҒёж“ҮйЎҢ','рҹ”— й…Қе°Қ'].map((s,i)=>{
    const c=i<cur?'done':i===cur?'current':'pending';
    return`<div class="phase-step ${c}">${i<cur?'вң“ ':''}${s}</div>`;
  }).join('');
}

function render(){
  const g=S.group,p=S.phase,area=document.getElementById('main-area');
  const gWords=GROUPS[g].idx.map(i=>W[i]);
  if(p===0) renderLearn(g,gWords,area);
  else if(p===1) renderMcq(g,gWords,area);
  else if(p===2) renderMatch(g,gWords,area);
  else renderDone(g,area);
}

// в”Җв”Җ LEARN в”Җв”Җ
function renderLearn(g,gWords,area){
  const cards=gWords.map((w,i)=>`
    <div class="learn-card">
      <div class="card-top">
        <span class="card-en">${w.en}</span>
        <span class="card-ph">${w.ph}</span>
        <span class="pos-badge ${posClass(w.pos)}">${w.pos}</span>
      </div>
      <div class="card-zh">${w.zh}</div>
      <div class="card-colloc">жҗӯй…Қпјҡ${w.col}</div><br>
      <div class="card-ex">дҫӢпјҡ${w.ex}</div>
    </div>`).join('');
  area.innerHTML=`<div class="phase-bar">${phaseBar(0)}</div>${cards}
    <button class="next-btn" onclick="setPhase(1)">иЁҳдҪҸдәҶпјҒеҺ»еҒҡйҒёж“ҮйЎҢ вҶ’</button>`;
}

// в”Җв”Җ MCQ в”Җв”Җ
function renderMcq(g,gWords,area){
  const items=gWords.map((w,qi)=>{
    const pool=shuf(gWords.filter((_,j)=>j!==qi)).slice(0,3).map(d=>d.zh);
    const opts=shuf([w.zh,...pool]);
    const btns=opts.map(o=>`<button class="mcq-opt" onclick="pickMcq(this,${g},${qi},'${o.replace(/['"]/g,'')}')">${o}</button>`).join('');
    return`<div class="mcq-block" id="mq${g}_${qi}">
      <div class="mcq-q">
        <div class="mcq-qtext">Q${qi+1}. "${w.en}" зҡ„дёӯж–Үж„ҸжҖқжҳҜпјҹ</div>
        <div class="mcq-options">${btns}</div>
        <div class="feedback" id="mfb${g}_${qi}"></div>
      </div></div>`;
  }).join('');
  area.innerHTML=`<div class="phase-bar">${phaseBar(1)}</div>${items}
    <button class="next-btn" id="toMatch" onclick="setPhase(2)" disabled>е…ЁйғЁдҪңзӯ”еҫҢз№јзәҢ вҶ’</button>`;
  S.mcqAnswered[g]=0;
}

function pickMcq(btn,g,qi,chosen){
  const block=document.getElementById(`mq${g}_${qi}`);
  if(block.querySelector('.correct,.wrong')) return;
  const w=W[GROUPS[g].idx[qi]];
  const correct=w.zh;
  block.querySelectorAll('.mcq-opt').forEach(o=>o.disabled=true);
  const isOk=chosen===correct;
  btn.classList.add(isOk?'correct':'wrong');
  if(!isOk) block.querySelectorAll('.mcq-opt').forEach(o=>{if(o.textContent===correct)o.classList.add('correct');});
  const fb=document.getElementById(`mfb${g}_${qi}`);
  fb.className=`feedback ${isOk?'ok':'ng'}`;
  fb.textContent=isOk?'вң“ жӯЈзўәпјҒ':`вң— зӯ”жЎҲжҳҜпјҡ${correct}`;
  S.mcqAnswered[g]++;
  if(S.mcqAnswered[g]===GROUPS[g].idx.length) document.getElementById('toMatch').disabled=false;
}

// в”Җв”Җ MATCH в”Җв”Җ
function renderMatch(g,gWords,area){
  const enItems=gWords.map((w,i)=>({id:i,text:w.en,zh:w.zh}));
  const zhItems=shuf(gWords.map((w,i)=>({id:i,text:w.zh})));
  S.matchState[g]={enItems,zhItems,selectedEn:null,matched:new Set(),total:gWords.length};

  const enCol=enItems.map(item=>`
    <div class="match-item" id="men_${g}_${item.id}" onclick="pickEn(${g},${item.id})">${item.text}</div>
  `).join('');
  const zhCol=zhItems.map(item=>`
    <div class="match-item" id="mzh_${g}_${item.id}" onclick="pickZh(${g},${item.id})">${item.text}</div>
  `).join('');

  area.innerHTML=`<div class="phase-bar">${phaseBar(2)}</div>
    <div class="match-wrap">
      <div class="match-instruct">й»һйҒёе·Ұж¬„иӢұж–ҮпјҢеҶҚй»һеҸіж¬„дёӯж–Үе®ҢжҲҗй…Қе°Қ</div>
      <div class="match-grid">
        <div><div class="match-col-label">иӢұж–Ү</div><div class="match-col">${enCol}</div></div>
        <div><div class="match-col-label">дёӯж–Ү</div><div class="match-col">${zhCol}</div></div>
      </div>
      <div class="match-score" id="mscore_${g}"></div>
    </div>
    <button class="next-btn" id="toDone" onclick="finishGroup(${g})" disabled>е…ЁйғЁй…Қе°ҚеҫҢз№јзәҢ вҶ’</button>`;
}

function pickEn(g,id){
  const ms=S.matchState[g];
  if(!ms||ms.matched.has(id)) return;
  ms.selectedEn=id;
  document.querySelectorAll(`[id^="men_${g}_"]`).forEach(el=>{
    el.classList.toggle('selected', el.id===`men_${g}_${id}` && !ms.matched.has(id));
  });
}

function pickZh(g,id){
  const ms=S.matchState[g];
  if(!ms||ms.selectedEn===null) return;
  const enId=ms.selectedEn;
  if(ms.matched.has(enId)) return;

  const isCorrect=(enId===id);
  const enEl=document.getElementById(`men_${g}_${enId}`);
  const zhEl=document.getElementById(`mzh_${g}_${id}`);

  if(isCorrect){
    enEl.classList.remove('selected');
    enEl.classList.add('matched','locked');
    zhEl.classList.add('matched','locked');
    ms.matched.add(enId);
    ms.selectedEn=null;
    const score=document.getElementById(`mscore_${g}`);
    score.textContent=`вң“ ${ms.matched.size} / ${ms.total} й…Қе°Қе®ҢжҲҗ`;
    if(ms.matched.size===ms.total){
      score.textContent='рҹҺү е…ЁйғЁй…Қе°Қе®ҢжҲҗпјҒ';
      document.getElementById('toDone').disabled=false;
    }
  } else {
    enEl.classList.add('wrong-flash');
    zhEl.classList.add('wrong-flash');
    setTimeout(()=>{
      enEl.classList.remove('wrong-flash');
      zhEl.classList.remove('wrong-flash');
    },600);
  }
}

function finishGroup(g){
  S.done[g]=true;
  if(g<TOTAL_GROUPS-1){
    const nt=document.getElementById(`tab-${g+1}`);
    nt.classList.remove('locked');
    nt.textContent=GROUPS[g+1].label;
  }
  updateProg();
  S.phase=3;
  render();
}

function renderDone(g,area){
  const allDone=S.done.every(Boolean);
  area.innerHTML=`<div class="phase-bar">${phaseBar(3)}</div>
    <div class="score-wrap">
      <div class="score-circle">вң“</div>
      <div class="score-msg" style="margin-bottom:8px">з¬¬ ${g+1} зө„е®ҢжҲҗпјҒ</div>
      ${allDone?'<div style="font-size:15px;color:var(--indigo);font-weight:700;margin-top:8px">рҹҺү е…ЁйғЁ 15 еҖӢе–®еӯ—е®ҢжҲҗпјҒ</div>':''}
    </div>
    ${g<TOTAL_GROUPS-1?`<button class="unlock-btn" onclick="setGroup(${g+1})">еҺ»з¬¬ ${g+2} зө„ вҶ’</button>`:''}`;
}

updateProg();
render();
</script>
</body>
</html>
